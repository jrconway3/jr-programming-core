name: Deploy to SSH host

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Pull Production
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            # Open app dir
            cd "${{ secrets.REMOTE_DIR }}"

            # Sync working tree to production branch head
            git fetch origin production
            git checkout production
            git reset --hard origin/production

            # Clean stale build output that may have mismatched ownership
            if [ -d .next ]; then
              if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
                sudo chown -R "$(id -un):$(id -gn)" .next || true
              fi
              chmod -R u+rwX .next || true
              rm -rf .next || mv .next ".next.stale.$(date +%s)" || true
            fi

            # Create .env file
            > .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASS }}" >> .env
            echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "SHADOW_USER=null" >> .env
            echo "SHADOW_PASSWORD=null" >> .env
            echo "SHADOW_HOST=null" >> .env
            echo "SHADOW_PORT=null" >> .env
            echo "SHADOW_NAME=null" >> .env

            # Install deps for build and generate Prisma client
            npm ci
            npx prisma migrate deploy
            npx prisma generate

            # Build app
            if ! npm run build; then
              echo "Build failed on remote server"
              exit 1
            fi

            # Validate required build artifacts
            if [ ! -f .next/standalone/server.js ]; then
              echo "Missing .next/standalone/server.js after build"
              exit 1
            fi

            if [ ! -d .next/static ]; then
              echo "Missing .next/static after build"
              exit 1
            fi

            # Prepare standalone runtime assets for direct node execution
            mkdir -p .next/standalone/.next
            rm -rf .next/standalone/.next/static
            cp -R .next/static .next/standalone/.next/static
            rm -rf .next/standalone/public
            cp -R public .next/standalone/public

            # Recreate pm2 process with explicit standalone command
            if pm2 describe jrprogramming > /dev/null 2>&1; then
              pm2 delete jrprogramming
            fi

            # Wait for port 3000 to fully drain before starting new process
            for i in $(seq 1 15); do
              if ! lsof -iTCP:3000 -sTCP:LISTEN -t >/dev/null 2>&1; then
                break
              fi
              echo "Waiting for port 3000 to free... ($i/15)"
              sleep 2
            done

            # Force-kill any process still holding port 3000
            if lsof -iTCP:3000 -sTCP:LISTEN -t >/dev/null 2>&1; then
              echo "Port 3000 still occupied, force-killing"
              lsof -iTCP:3000 -sTCP:LISTEN -t | xargs kill -9 || true
              sleep 2
            fi

            pm2 start node --name "jrprogramming" -- .next/standalone/server.js
            pm2 save

            # Verify process and critical routes before reporting success
            sleep 5
            if ! pm2 pid jrprogramming | grep -qE '^[1-9][0-9]*$'; then
              echo "pm2 process jrprogramming is not online"
              pm2 logs jrprogramming --lines 100 --nostream || true
              exit 1
            fi

            if ! curl -fsS http://127.0.0.1:3000/ >/tmp/home.html; then
              echo "Homepage check failed"
              exit 1
            fi

            if ! grep -q '/_next/static/chunks/.*\.css' /tmp/home.html; then
              echo "Homepage did not reference a CSS chunk"
              exit 1
            fi

            css_path="$(grep -oE '/_next/static/chunks/[^\"]+\.css' /tmp/home.html | head -n 1)"
            if [ -z "$css_path" ]; then
              echo "Failed to extract CSS chunk path"
              exit 1
            fi

            if ! curl -fsS "http://127.0.0.1:3000${css_path}" >/dev/null; then
              echo "CSS chunk is not being served: ${css_path}"
              exit 1
            fi

            if ! curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              echo "Health endpoint check failed"
              exit 1
            fi