name: Deploy to SSH host

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

jobs:
  build-and-deploy:
    if: (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/production') || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'production')
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      DEPLOY_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Pull Production
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            tested_sha="${{ env.DEPLOY_SHA }}"

            # Open app dir
            cd "${{ secrets.REMOTE_DIR }}"

            # Sync working tree to the exact commit that passed CI
            git fetch --prune origin
            git checkout --force "$tested_sha"
            git reset --hard "$tested_sha"

            # Clean stale build output that may have mismatched ownership
            if [ -d .next ]; then
              if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
                sudo chown -R "$(id -un):$(id -gn)" .next || true
              fi
              chmod -R u+rwX .next || true
              rm -rf .next || mv .next ".next.stale.$(date +%s)" || true
            fi

            # Create .env with JSON-quoted values so special characters cannot break the file format
            node <<'NODE'
            const { writeFileSync } = require('node:fs');

            function serializeEnvValue(value) {
              return JSON.stringify(value ?? '');
            }

            const envValues = {
              DB_USER: ${{ toJson(secrets.DB_USER) }},
              DB_PASSWORD: ${{ toJson(secrets.DB_PASS) }},
              DB_HOST: ${{ toJson(secrets.DB_HOST) }},
              DB_PORT: ${{ toJson(secrets.DB_PORT) }},
              DB_NAME: ${{ toJson(secrets.DB_NAME) }},
              CONTACT_EMAIL_TO: ${{ toJson(secrets.CONTACT_EMAIL_TO) }},
              CONTACT_EMAIL_FROM: ${{ toJson(secrets.CONTACT_EMAIL_FROM) }},
              CONTACT_IP_HASH_SECRET: ${{ toJson(secrets.CONTACT_IP_HASH_SECRET) }},
              SMTP_HOST: ${{ toJson(secrets.SMTP_HOST) }},
              SMTP_PORT: ${{ toJson(secrets.SMTP_PORT) }},
              SMTP_SECURE: ${{ toJson(secrets.SMTP_SECURE) }},
              SMTP_USER: ${{ toJson(secrets.SMTP_USER) }},
              SMTP_PASSWORD: ${{ toJson(secrets.SMTP_PASSWORD) }},
            };

            const envFile = Object.entries(envValues)
              .map(([key, value]) => `${key}=${serializeEnvValue(value)}`)
              .join('\n');

            writeFileSync('.env', `${envFile}\n`, 'utf8');
            NODE

            # Install deps for build and generate Prisma client
            npm ci
            npx prisma migrate deploy
            npx prisma generate

            # Build app
            if ! npm run build; then
              echo "Build failed on remote server"
              exit 1
            fi

            # Validate required build artifacts
            if [ ! -d .next/static ]; then
              echo "Missing .next/static after build"
              exit 1
            fi

            # Start or restart pm2 process
            if pm2 describe jrprogramming > /dev/null 2>&1; then
              pm2 restart jrprogramming
            else
              pm2 start npm --name "jrprogramming" -- start
            fi
            pm2 save

            # Verify process and critical routes before reporting success
            sleep 5
            if ! pm2 pid jrprogramming | grep -qE '^[1-9][0-9]*$'; then
              echo "pm2 process jrprogramming is not online"
              pm2 logs jrprogramming --lines 100 --nostream || true
              exit 1
            fi

            if ! curl -fsS http://127.0.0.1:3000/ >/tmp/home.html; then
              echo "Homepage check failed"
              exit 1
            fi

            if ! grep -q '/_next/static/chunks/.*\.css' /tmp/home.html; then
              echo "Homepage did not reference a CSS chunk"
              exit 1
            fi

            css_path="$(grep -oE '/_next/static/chunks/[^\"]+\.css' /tmp/home.html | head -n 1)"
            if [ -z "$css_path" ]; then
              echo "Failed to extract CSS chunk path"
              exit 1
            fi

            if ! curl -fsS "http://127.0.0.1:3000${css_path}" >/dev/null; then
              echo "CSS chunk is not being served: ${css_path}"
              exit 1
            fi

            if ! curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              echo "Health endpoint check failed"
              exit 1
            fi