name: Deploy to SSH host

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Pull Production
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT || 22 }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            # Open app dir
            cd "${{ secrets.REMOTE_DIR }}"

            # Sync working tree to production branch head
            git pull origin production

            # Clean stale build output that may have mismatched ownership
            if [ -d .next ]; then
              if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
                sudo chown -R "$(id -un):$(id -gn)" .next || true
              fi
              chmod -R u+rwX .next || true
              rm -rf .next || mv .next ".next.stale.$(date +%s)" || true
            fi

            # Create .env file from GitHub secrets without shell re-expanding secret values
            cat > .env <<'EOF'
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASS }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            SHADOW_USER=null
            SHADOW_PASSWORD=null
            SHADOW_HOST=null
            SHADOW_PORT=null
            SHADOW_NAME=null
            CONTACT_EMAIL_TO=${{ secrets.CONTACT_EMAIL_TO }}
            CONTACT_EMAIL_FROM=${{ secrets.CONTACT_EMAIL_FROM }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_SECURE=${{ secrets.SMTP_SECURE }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            EOF

            # Install deps for build and generate Prisma client
            npm ci --omit=dev
            npx prisma migrate deploy
            npx prisma generate

            # Build app
            if ! npm run build; then
              echo "Build failed on remote server"
              exit 1
            fi

            # Validate required build artifacts
            if [ ! -d .next/static ]; then
              echo "Missing .next/static after build"
              exit 1
            fi

            # Start or restart pm2 process
            if pm2 describe jrprogramming > /dev/null 2>&1; then
              pm2 restart jrprogramming
            else
              pm2 start npm --name "jrprogramming" -- start
            fi
            pm2 save

            # Verify process and critical routes before reporting success
            sleep 5
            if ! pm2 pid jrprogramming | grep -qE '^[1-9][0-9]*$'; then
              echo "pm2 process jrprogramming is not online"
              pm2 logs jrprogramming --lines 100 --nostream || true
              exit 1
            fi

            if ! curl -fsS http://127.0.0.1:3000/ >/tmp/home.html; then
              echo "Homepage check failed"
              exit 1
            fi

            if ! grep -q '/_next/static/chunks/.*\.css' /tmp/home.html; then
              echo "Homepage did not reference a CSS chunk"
              exit 1
            fi

            css_path="$(grep -oE '/_next/static/chunks/[^\"]+\.css' /tmp/home.html | head -n 1)"
            if [ -z "$css_path" ]; then
              echo "Failed to extract CSS chunk path"
              exit 1
            fi

            if ! curl -fsS "http://127.0.0.1:3000${css_path}" >/dev/null; then
              echo "CSS chunk is not being served: ${css_path}"
              exit 1
            fi

            if ! curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              echo "Health endpoint check failed"
              exit 1
            fi