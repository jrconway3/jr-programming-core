name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DB_HOST: localhost
      DB_PORT: 3306
      DB_USER: ci
      DB_PASSWORD: ci
      DB_NAME: jrprogramming_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Tests
        run: npm test

      - name: Run ESLint
        run: npm run lint

      - name: Run Production Build
        run: npm run build